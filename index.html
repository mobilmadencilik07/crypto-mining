<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Mining 3.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
padding:20px;
overflow-x:hidden;
}

.title{
font-size:42px;
font-weight:bold;
margin-bottom:25px;
}

.coin{
background:#0f172a;
padding:18px;
border-radius:22px;
margin-bottom:16px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid #1e293b;
transition:0.2s;
}

.coin:hover{
transform:scale(1.03);
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:55px;
height:55px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
}

.btc{background:#f7931a;}
.eth{background:#627eea;}
.sol{background:#14f195;color:black;}
.xrp{background:#23292f;}
.bnb{background:#f3ba2f;color:black;}

.arrow{
font-size:26px;
opacity:0.7;
}

#miningPage{
display:none;
text-align:center;
padding-top:30px;
}

.bigLogo{
width:180px;
height:180px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:90px;
margin:auto;
animation:spin 5s linear infinite;
box-shadow:0 0 50px rgba(255,255,255,0.2);
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.mineTitle{
font-size:40px;
margin-top:25px;
}

.balance{
font-size:48px;
margin-top:20px;
color:#14f195;
font-weight:bold;
}

.card{
background:#0f172a;
padding:25px;
border-radius:25px;
margin-top:30px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:20px;
font-size:24px;
}

.green{
color:#14f195;
}

.redBtn{
margin-top:30px;
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:black;
border:2px solid red;
color:red;
font-size:24px;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
padding:20px;
display:flex;
justify-content:space-around;
font-size:20px;
}

</style>
</head>

<body>

<div id="home">

<div class="title">
Choose blockchain
</div>

<div class="coin" onclick="mine('Bitcoin','₿','btc')">
<div class="left">
<div class="logo btc">₿</div>
<h2>Bitcoin</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="mine('Ethereum','◆','eth')">
<div class="left">
<div class="logo eth">◆</div>
<h2>Ethereum</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="mine('Solana','◎','sol')">
<div class="left">
<div class="logo sol">◎</div>
<h2>Solana</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="mine('XRP','✕','xrp')">
<div class="left">
<div class="logo xrp">✕</div>
<h2>XRP</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="mine('BNB','◈','bnb')">
<div class="left">
<div class="logo bnb">◈</div>
<h2>BNB</h2>
</div>
<div class="arrow">→</div>
</div>

</div>

<div id="miningPage">

<div class="bigLogo" id="bigLogo">
₿
</div>

<div class="mineTitle" id="coinName">
Bitcoin Mining
</div>

<div class="balance" id="balance">
0.000000 BTC
</div>

<div class="card">

<div class="row">
<span>Hashrate</span>
<span class="green">512 MH/s</span>
</div>

<div class="row">
<span>Status</span>
<span class="green">Mining ●</span>
</div>

<button class="redBtn" onclick="stopMining()">
STOP MINING
</button>

</div>

</div>

<div class="bottom">
<div>DASHBOARD</div>
<div>SEARCH</div>
<div>SETTINGS</div>
</div>

<script>

let balance = 0;
let mining;

function mine(name,logo,cls){

document.getElementById("home").style.display="none";
document.getElementById("miningPage").style.display="block";

document.getElementById("coinName").innerText=name + " Mining";

let big=document.getElementById("bigLogo");

big.innerText=logo;
big.className="bigLogo " + cls;

mining=setInterval(()=>{

balance += Math.random()/200;

document.getElementById("balance").innerText=
balance.toFixed(6) + " " + name;

},1000);

}

function stopMining(){

clearInterval(mining);

document.getElementById("home").style.display="block";
document.getElementById("miningPage").style.display="none";

balance=0;

}

</script>

</body>
</html>
