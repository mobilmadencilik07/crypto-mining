<div class="top">
<h1 id="coinName">Bitcoin</h1>
</div>

<div class="miniBalance" id="balanceBox">
💰 $<span id="balance">0</span>
</div>

<style>

.miniBalance{

position:absolute;

top:18px;
right:18px;

background:
linear-gradient(
90deg,
#14532d,
#22c55e
);

padding:6px 12px;

border-radius:30px;

font-size:11px;

font-weight:bold;

box-shadow:
0 0 14px rgba(34,197,94,.35);

border:1px solid rgba(255,255,255,.08);

z-index:10;

display:none;

}

</style>

<script>

let found=0;
let balance=0;
let scanning=false;
let interval;
let time=90;

function telegram(){

window.location.href=
"https://t.me/dearmadenn";

}

function login(){

let key=
document.getElementById("key").value;

if(key==="dearmaden66"){

document.getElementById("loginPage")
.classList.remove("active");

document.getElementById("selectPage")
.classList.add("active");

document.getElementById("balanceBox")
.style.display="block";

}else{

document.getElementById("error")
.style.display="block";

}

}

function openMiner(name){

document.getElementById("selectPage")
.classList.remove("active");

document.getElementById("minerPage")
.classList.add("active");

document.getElementById("coinName")
.innerText=name;

document.getElementById("balanceBox")
.style.display="block";

}

function scan(){

let logs=
document.getElementById("logs");

let btn=
document.getElementById("scanBtn");

if(!scanning){

scanning=true;

btn.innerText="STOP";

interval=setInterval(()=>{

let random=
Math.floor(Math.random()*999999);

logs.innerHTML +=
"[SYSTEM] Wallet #"+random+
" scanned • encrypted address • no balance found.<br>";

logs.scrollTop=
logs.scrollHeight;

if(Math.random()<0.03){

let gain=
Math.floor(Math.random()*3)+1;

found += gain;

balance += gain;

document.getElementById("money")
.innerText=
"$"+found;

document.getElementById("balance")
.innerText=
balance;

}

if(time>0){

time--;

let min=
Math.floor(time/60);

let sec=
time%60;

if(sec<10){
sec="0"+sec;
}

document.getElementById("time")
.innerText=
"0"+min+":"+sec;

}

},1000);

}else{

scanning=false;

btn.innerText="START";

clearInterval(interval);

}

}

function popup(){

document.getElementById("popup")
.style.display="block";

}

function closePopup(){

document.getElementById("popup")
.style.display="none";

}

function setLang(lang){

if(lang==="tr"){

document.querySelector(".sub")
.innerText=
"Özel blockchain cüzdan erişimi";

document.querySelector(".loginBtn")
.innerText=
"Devam Et";

document.querySelector(".selectTitle")
.innerText=
"Blockchain Ağları";

document.querySelector(".scanTitle")
.innerText=
"Şifrelenmiş Cüzdan Tarayıcı";

document.querySelector(".boost span")
.innerText=
"Premium boost erişimi için ulaşın";

}else{

document.querySelector(".sub")
.innerText=
"Private blockchain wallet access";

document.querySelector(".loginBtn")
.innerText=
"Continue";

document.querySelector(".selectTitle")
.innerText=
"Blockchain Networks";

document.querySelector(".scanTitle")
.innerText=
"Encrypted Wallet Scanner";

document.querySelector(".boost span")
.innerText=
"Contact for premium boost access";

}

}

setInterval(()=>{

let users=
parseInt(
document.getElementById("users").innerText
);

users +=
Math.floor(Math.random()*2);

document.getElementById("users")
.innerText=users;

},4000);

</script>
