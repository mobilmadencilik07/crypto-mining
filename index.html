<script>

let found=0;
let scanning=false;
let interval;
let currentLang="en";

let remainingSeconds=
Math.floor(Math.random()*18000)+3600;
/* 1-6 saat */

function telegram(){
window.location.href="https://t.me/dearmadenn";
}

function login(){

let key=document.getElementById("key").value;

if(key==="dearmaden66"){

document.getElementById("loginPage").classList.remove("active");

document.getElementById("selectPage").classList.add("active");

}else{

document.getElementById("error").style.display="block";

}

}

function openMiner(name){

document.getElementById("selectPage").classList.remove("active");

document.getElementById("minerPage").classList.add("active");

document.getElementById("coinName").innerText=name;

updateTimer();

}

function updateTimer(){

let hours=
Math.floor(remainingSeconds/3600);

let minutes=
Math.floor((remainingSeconds%3600)/60);

if(minutes<10){
minutes="0"+minutes;
}

if(currentLang==="tr"){

document.getElementById("time").innerHTML=
hours+" saat "+minutes+" dk";

}else{

document.getElementById("time").innerHTML=
hours+"h "+minutes+"m";

}

}

function scan(){

let logs=document.getElementById("logs");

let btn=document.getElementById("scanBtn");

if(!scanning){

scanning=true;

btn.innerText=
currentLang==="tr"
? "DURDUR"
: "STOP";

interval=setInterval(()=>{

let random=
Math.floor(Math.random()*999999);

if(currentLang==="tr"){

logs.innerHTML +=
"[SİSTEM] Cüzdan #"+random+" tarandı • şifreli adres • aktif bakiye bulunamadı.<br>";

}else{

logs.innerHTML +=
"[SYSTEM] Wallet #"+random+" scanned • encrypted address • no active balance found.<br>";

}

logs.scrollTop=
logs.scrollHeight;

if(remainingSeconds>0){

remainingSeconds--;

updateTimer();

}else{

if(found===0){

found=
Math.floor(Math.random()*491)+10;

document.getElementById("money").innerText=
"$"+found;

if(currentLang==="tr"){

logs.innerHTML +=
"<br>✅ Şifreli cüzdan bulundu • bakiye başarıyla çözüldü.<br>";

}else{

logs.innerHTML +=
"<br>✅ Encrypted wallet found • balance successfully decoded.<br>";

}

logs.scrollTop=
logs.scrollHeight;

}

}

},1000);

}else{

scanning=false;

btn.innerText=
currentLang==="tr"
? "BAŞLAT"
: "START";

clearInterval(interval);

}

}

function popup(){

document.getElementById("popup").style.display="block";

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

function setLang(lang){

currentLang=lang;

if(lang==="tr"){

document.querySelector(".sub").innerText=
"Özel blockchain cüzdan erişimi";

document.querySelector(".loginBtn").innerText=
"Devam Et";

document.querySelector(".selectTitle").innerText=
"Blockchain Ağları";

document.querySelector(".scanTitle").innerText=
"Şifrelenmiş Cüzdan Tarayıcı";

document.querySelector(".boost span").innerText=
"Premium boost erişimi için ulaşın";

document.querySelector(".estimateText").innerText=
"Tahmini Bulma Süresi";

document.querySelector(".withdrawText").innerText=
"Minimum çekim tutarı 10$";

document.querySelector(".withdrawBtn").innerText=
"ÇEKİM TALEBİ";

document.querySelector(".closeBtn").innerText=
"Kapat";

document.querySelector(".loginBtn").innerText=
"Devam Et";

document.querySelector(".bottom").innerHTML=
`
<div>PANEL</div>
<div>ARAMA</div>
<div onclick="telegram()">DESTEK</div>
`;

}else{

document.querySelector(".sub").innerText=
"Private blockchain wallet access";

document.querySelector(".loginBtn").innerText=
"Continue";

document.querySelector(".selectTitle").innerText=
"Blockchain Networks";

document.querySelector(".scanTitle").innerText=
"Encrypted Wallet Scanner";

document.querySelector(".boost span").innerText=
"Contact for premium boost access";

document.querySelector(".estimateText").innerText=
"Estimated Finding Time";

document.querySelector(".withdrawText").innerText=
"Minimum withdraw amount is $10";

document.querySelector(".withdrawBtn").innerText=
"REQUEST WITHDRAW";

document.querySelector(".closeBtn").innerText=
"Close";

document.querySelector(".bottom").innerHTML=
`
<div>DASHBOARD</div>
<div>SEARCH</div>
<div onclick="telegram()">SUPPORT</div>
`;

}

updateTimer();

}

setInterval(()=>{

let users=
parseInt(document.getElementById("users").innerText);

users += Math.floor(Math.random()*2);

document.getElementById("users").innerText=
users;

},4000);

</script>
