<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto App</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#030712;
color:white;
overflow:hidden;
}

.moneyRain{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
opacity:0.05;
z-index:-1;
}

.moneyRain span{
position:absolute;
top:-50px;
font-size:24px;
animation:fall 12s linear infinite;
}

.moneyRain span:nth-child(1){left:10%;animation-delay:0s;}
.moneyRain span:nth-child(2){left:25%;animation-delay:2s;}
.moneyRain span:nth-child(3){left:40%;animation-delay:5s;}
.moneyRain span:nth-child(4){left:55%;animation-delay:1s;}
.moneyRain span:nth-child(5){left:70%;animation-delay:4s;}
.moneyRain span:nth-child(6){left:85%;animation-delay:3s;}
.moneyRain span:nth-child(7){left:95%;animation-delay:6s;}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(120vh) rotate(360deg);
opacity:0;
}
}

.page{
display:none;
min-height:100vh;
padding:18px;
}

.active{
display:block;
}

.splash{
position:fixed;
inset:0;
background:#030712;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:hideSplash 1s forwards;
animation-delay:2s;
}

@keyframes hideSplash{
to{
opacity:0;
visibility:hidden;
}
}

.loader{
width:80px;
height:80px;
border-radius:50%;
border:4px solid #1e293b;
border-top:4px solid #60a5fa;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.splash h1{
margin-top:20px;
font-size:28px;
font-weight:700;
}

.splash p{
opacity:0.6;
margin-top:8px;
font-size:13px;
}

.bg{
position:absolute;
right:-20px;
top:-20px;
font-size:150px;
font-weight:700;
opacity:0.03;
color:#60a5fa;
pointer-events:none;
}

.center{
padding-top:55px;
text-align:center;
}

.langSwitch{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:14px;
}

.langSwitch button{
background:#0f172a;
border:1px solid #1e293b;
color:white;
padding:8px 16px;
border-radius:12px;
font-size:12px;
}

.usersBox{
background:#0f172a;
border:1px solid #1e293b;
padding:12px;
border-radius:16px;
margin-bottom:18px;
font-size:13px;
opacity:0.9;
}

.title{
font-size:32px;
font-weight:600;
letter-spacing:-1px;
}

.sub{
opacity:0.55;
margin-top:8px;
margin-bottom:20px;
font-size:13px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:20px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
font-size:14px;
outline:none;
margin-top:10px;
}

.loginBtn{
width:100%;
padding:16px;
border:none;
border-radius:20px;
margin-top:16px;
background:linear-gradient(90deg,#60a5fa,#2563eb);
color:white;
font-size:14px;
font-weight:600;
}

.error{
margin-top:12px;
color:#ef4444;
font-size:13px;
display:none;
}

.boxes{
display:flex;
gap:10px;
margin-top:30px;
}

.box{
flex:1;
background:#0f172a;
border:1px solid #1e293b;
padding:22px 8px;
border-radius:22px;
font-size:12px;
font-weight:600;
}

.icon{
font-size:24px;
margin-bottom:12px;
}

.selectTitle{
font-size:24px;
font-weight:600;
margin-bottom:18px;
}

.stats{
display:flex;
gap:10px;
margin-bottom:16px;
}

.stat{
flex:1;
background:#0f172a;
border:1px solid #1e293b;
padding:14px;
border-radius:18px;
}

.stat h3{
font-size:11px;
opacity:0.6;
font-weight:400;
}

.stat p{
margin-top:8px;
font-size:15px;
font-weight:600;
}

.activityBox{
margin-top:14px;
background:#0f172a;
border:1px solid #1e293b;
padding:14px;
border-radius:18px;
font-size:12px;
line-height:1.9;
}

.activityTitle{
font-size:13px;
font-weight:600;
margin-bottom:8px;
opacity:0.7;
}

.coin{
position:relative;
background:#0f172a;
border:1px solid #1e293b;
padding:14px;
border-radius:20px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.coinSub{
font-size:11px;
opacity:0.55;
margin-top:3px;
}

.tag{
position:absolute;
top:-7px;
right:12px;
background:#2563eb;
padding:5px 9px;
border-radius:30px;
font-size:9px;
font-weight:700;
}

.recommended{
border:1px solid #2563eb;
box-shadow:0 0 18px rgba(37,99,235,0.12);
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:44px;
height:44px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
font-weight:700;
}

.btc{background:#f7931a;}
.eth{background:#627eea;}
.sol{background:#14f195;color:black;}
.bnb{background:#f3ba2f;color:black;}
.xrp{background:#111827;}
.ton{background:#0098ea;}

.coin h2{
font-size:15px;
font-weight:600;
}

.arrow{
opacity:0.4;
font-size:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.top h1{
font-size:24px;
font-weight:600;
}

.energy{
background:#111827;
padding:7px 12px;
border-radius:30px;
font-size:11px;
border:1px solid #1e293b;
}

.scanTitle{
font-size:24px;
font-weight:600;
margin-bottom:16px;
}

.logs{
height:190px;
overflow:auto;
background:#0f172a;
border:1px solid #1e293b;
padding:14px;
border-radius:20px;
font-size:11px;
line-height:1.8;
opacity:0.82;
}

.logs::-webkit-scrollbar{
display:none;
}

.found{
margin-top:16px;
font-size:28px;
font-weight:600;
}

.green{
color:#22c55e;
}

.chart{
height:70px;
background:linear-gradient(180deg,#0f172a,#020617);
border-radius:18px;
margin-top:14px;
position:relative;
overflow:hidden;
border:1px solid #1e293b;
}

.line{
position:absolute;
width:160%;
height:2px;
background:#60a5fa;
top:50%;
left:-20%;
transform:rotate(-6deg);
animation:move 4s linear infinite;
}

@keyframes move{
0%{transform:translateX(-20%) rotate(-6deg);}
100%{transform:translateX(20%) rotate(-6deg);}
}

.estimateBox{
margin-top:12px;
background:#111827;
border:1px solid #1e293b;
padding:12px;
border-radius:16px;
font-size:12px;
text-align:center;
line-height:1.7;
}

.estimateTime{
margin-top:6px;
font-size:15px;
font-weight:600;
color:#60a5fa;
}

.miniBoost{
margin-top:12px;
background:#111827;
border:1px solid #334155;
padding:12px;
border-radius:16px;
font-size:12px;
text-align:center;
line-height:1.7;
}

.miniBoost span{
opacity:0.6;
font-size:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:16px;
}

.btn{
flex:1;
padding:16px;
border-radius:18px;
text-align:center;
font-size:13px;
font-weight:600;
}

.start{
background:#172554;
border:1px solid #1d4ed8;
}

.withdraw{
background:#0f172a;
border:1px solid #334155;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0b1120;
border-top:1px solid #1e293b;
padding:12px;
display:flex;
justify-content:space-around;
font-size:11px;
opacity:0.75;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0f172a;
border:1px solid #334155;
padding:22px;
border-radius:24px;
width:88%;
display:none;
z-index:999;
}

.popup h2{
font-size:20px;
margin-bottom:10px;
font-weight:600;
}

.popup p{
opacity:0.65;
line-height:1.7;
font-size:12px;
}

.popup button{
margin-top:14px;
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#2563eb;
color:white;
font-size:13px;
}

.closeBtn{
margin-top:8px !important;
background:#111827 !important;
border:1px solid #334155;
}

</style>
</head>

<body>

<div class="moneyRain">
<span>$</span>
<span>₿</span>
<span>◆</span>
<span>$</span>
<span>◎</span>
<span>◈</span>
<span>$</span>
</div>

<div class="splash">
<div class="loader"></div>
<h1>Crypto App</h1>
<p>Initializing encrypted blockchain scanner...</p>
</div>
