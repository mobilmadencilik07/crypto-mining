<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto ICE V4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
overflow:hidden;
}

.page{
display:none;
min-height:100vh;
padding:25px;
}

.active{
display:block;
}

.logoBg{
position:absolute;
top:0;
right:0;
font-size:180px;
font-weight:bold;
opacity:0.05;
color:#4da3ff;
}

.center{
text-align:center;
padding-top:90px;
}

.title{
font-size:48px;
font-weight:bold;
}

.sub{
opacity:0.7;
margin-top:10px;
margin-bottom:30px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:#0f172a;
color:white;
font-size:20px;
margin-top:20px;
}

.loginBtn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
margin-top:25px;
font-size:22px;
font-weight:bold;
background:white;
}

.boxes{
display:flex;
gap:15px;
margin-top:60px;
}

.smallBox{
flex:1;
background:white;
color:black;
padding:30px 10px;
border-radius:25px;
font-weight:bold;
font-size:22px;
text-align:center;
}

.selectTitle{
font-size:45px;
font-weight:bold;
margin-bottom:25px;
}

.coin{
background:#0f172a;
padding:18px;
border-radius:22px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:50px;
height:50px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
font-weight:bold;
}

.btc{background:#f7931a;}
.eth{background:#627eea;}
.sol{background:#14f195;color:black;}
.xrp{background:#23292f;}
.bnb{background:#f3ba2f;color:black;}

.arrow{
font-size:25px;
opacity:0.7;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.back{
font-size:30px;
}

.energy{
background:white;
color:black;
padding:8px 16px;
border-radius:30px;
font-weight:bold;
}

.scanTitle{
font-size:42px;
font-weight:bold;
}

.logs{
margin-top:30px;
height:250px;
overflow:hidden;
opacity:0.7;
line-height:1.8;
}

.found{
margin-top:20px;
font-size:40px;
font-weight:bold;
}

.green{
color:#14f195;
}

.buttons{
display:flex;
gap:15px;
margin-top:30px;
}

.btn{
flex:1;
padding:25px;
border-radius:25px;
text-align:center;
font-size:25px;
font-weight:bold;
background:#111827;
}

.red{
background:#2a0b0b;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
padding:20px;
display:flex;
justify-content:space-around;
font-size:18px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="page active" id="loginPage">

<div class="logoBg">V4</div>

<div class="center">

<div class="title">
Welcome!
</div>

<div class="sub">
Log in to your account
</div>

<input placeholder="Your Key">

<button class="loginBtn" onclick="openSelect()">
Log In
</button>

<div class="boxes">

<div class="smallBox">
ICE
<br><br>
GET ACCESS
</div>

<div class="smallBox">
SUPPORT
</div>

</div>

</div>

</div>

<!-- SELECT -->

<div class="page" id="selectPage">

<div class="selectTitle">
Choose blockchain
</div>

<div class="coin" onclick="openMiner('Bitcoin','₿','btc')">
<div class="left">
<div class="logo btc">₿</div>
<h2>Bitcoin</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="openMiner('Ethereum','◆','eth')">
<div class="left">
<div class="logo eth">◆</div>
<h2>Ethereum</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="openMiner('Solana','◎','sol')">
<div class="left">
<div class="logo sol">◎</div>
<h2>Solana</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="openMiner('XRP','✕','xrp')">
<div class="left">
<div class="logo xrp">✕</div>
<h2>XRP</h2>
</div>
<div class="arrow">→</div>
</div>

<div class="coin" onclick="openMiner('BNB','◈','bnb')">
<div class="left">
<div class="logo bnb">◈</div>
<h2>BNB</h2>
</div>
<div class="arrow">→</div>
</div>

</div>

<!-- MINER -->

<div class="page" id="minerPage">

<div class="topBar">
<div class="back" onclick="backSelect()">←</div>
<div id="coinTop" style="font-size:35px;font-weight:bold;">
Bitcoin
</div>
<div class="energy">
⚡ 27
</div>
</div>

<div class="scanTitle">
Wallet Scanner
</div>

<div class="logs" id="logs">

</div>

<div class="found">
Found:
<span class="green" id="money">
$0
</span>
</div>

<div class="buttons">

<div class="btn red" onclick="startScan()">
START
</div>

<div class="btn">
Withdraw →
</div>

</div>

</div>

<div class="bottom">
<div>DASHBOARD</div>
<div>SEARCH</div>
<div>SETTINGS</div>
</div>

<script>

let found=0;

function openSelect(){

document.getElementById("loginPage").classList.remove("active");
document.getElementById("selectPage").classList.add("active");

}

function openMiner(name){

document.getElementById("selectPage").classList.remove("active");
document.getElementById("minerPage").classList.add("active");

document.getElementById("coinTop").innerText=name;

}

function backSelect(){

document.getElementById("minerPage").classList.remove("active");
document.getElementById("selectPage").classList.add("active");

}

function startScan(){

let logs=document.getElementById("logs");

logs.innerHTML="";

let count=0;

let scan=setInterval(()=>{

count++;

let text=
"Balance: $0 || Wallet check: active crypted wallet scanning process...";

logs.innerHTML += text + "<br>";

logs.scrollTop=logs.scrollHeight;

if(count % 6===0){

found += Math.floor(Math.random()*20);

document.getElementById("money").innerText=
"$"+found;

}

if(count>=30){

clearInterval(scan);

}

},200);

}

</script>

</body>
</html>
