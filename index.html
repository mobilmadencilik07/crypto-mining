<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto ICE 3.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#020617;
color:white;
overflow:hidden;
}

.page{
min-height:100vh;
padding:20px;
position:relative;
overflow:hidden;

background:
linear-gradient(
180deg,
#040b2d,
#071b52,
#06163b
);

}

.page::before{

content:"";
position:absolute;
inset:0;

background:
repeating-linear-gradient(
75deg,
rgba(0,140,255,.18) 0px,
rgba(0,140,255,.18) 40px,
transparent 40px,
transparent 120px
);

filter:blur(2px);

animation:bgmove 8s linear infinite;

}

@keyframes bgmove{

0%{
transform:translateX(0);
}

100%{
transform:translateX(120px);
}

}

.top{

display:flex;
align-items:center;
gap:18px;

position:relative;
z-index:2;

}

.backBtn{

width:34px;
height:34px;

border-radius:50%;

background:#172554;

display:flex;
justify-content:center;
align-items:center;

font-size:18px;

}

.title{

font-size:30px;
font-weight:bold;
letter-spacing:2px;

}

.foundTitle{

margin-top:70px;

font-size:42px;
font-weight:bold;

text-align:center;

position:relative;
z-index:2;

}

.scanBox{

margin-top:40px;

background:
linear-gradient(
180deg,
rgba(35,90,255,.5),
rgba(17,24,39,.9)
);

border:2px solid rgba(96,165,250,.4);

border-radius:40px;

padding:22px;

position:relative;
z-index:2;

backdrop-filter:blur(10px);

}

.count{

text-align:center;

font-size:18px;

margin-bottom:16px;

opacity:.9;

}

.terminal{

height:260px;

background:
linear-gradient(
180deg,
rgba(10,15,40,.9),
rgba(20,20,60,.7)
);

border-radius:24px;

padding:14px;

overflow:auto;

font-size:12px;

line-height:1.9;

color:#22c55e;

font-family:monospace;

box-shadow:
inset 0 0 20px rgba(0,0,0,.5);

}

.terminal::-webkit-scrollbar{
display:none;
}

.buttons{

display:flex;
gap:12px;

margin-top:20px;

}

.btn{

flex:1;

padding:18px;

border-radius:20px;

text-align:center;

font-size:16px;
font-weight:bold;

}

.withdrawBtn{

background:
linear-gradient(
90deg,
#4f46e5,
#60a5fa
);

}

.clearBtn{

background:
linear-gradient(
90deg,
#6b7280,
#9ca3af
);

color:white;

}

.startBtn{

margin-top:16px;

width:100%;

padding:18px;

border:none;

border-radius:24px;

font-size:18px;
font-weight:bold;

background:
linear-gradient(
90deg,
#1d4ed8,
#60a5fa
);

color:white;

position:relative;
z-index:2;

}

.energy{

position:absolute;
top:24px;
right:20px;

background:#172554;

padding:8px 14px;

border-radius:30px;

font-size:12px;

z-index:2;

}

</style>
</head>

<body>

<div class="page">

<div class="energy">
⚡ 27 ENERGY
</div>

<div class="top">

<div class="backBtn">
←
</div>

<div class="title">
CRYPTO ICE 3.0
</div>

</div>

<div class="foundTitle">
FOUND
</div>

<div class="scanBox">

<div class="count">
FOUND:
<span id="foundCount">
0
</span>
</div>

<div class="terminal" id="logs">

[SYSTEM] Scanner initialized...<br>

</div>

<div class="buttons">

<div class="btn withdrawBtn"
onclick="telegram()">
WITHDRAW
</div>

<div class="btn clearBtn"
onclick="clearLogs()">
CLEAR
</div>

</div>

</div>

<button class="startBtn"
id="scanBtn"
onclick="scan()">
START SCAN
</button>

</div>

<script>

let scanning=false;
let interval;
let found=0;

function telegram(){

window.location.href=
"https://t.me/dearmadenn";

}

function clearLogs(){

document.getElementById("logs")
.innerHTML=
"[SYSTEM] Scanner cleared...<br>";

document.getElementById("foundCount")
.innerText="0";

found=0;

}

function scan(){

let logs=
document.getElementById("logs");

let btn=
document.getElementById("scanBtn");

if(!scanning){

scanning=true;

btn.innerText="STOP SCAN";

interval=setInterval(()=>{

let wallet=
Math.random()
.toString(16)
.substring(2,12);

logs.innerHTML +=
"[0x"+
wallet.toUpperCase()+
"] WALLET ANALYZED<br>";

if(Math.random()<0.08){

found++;

document.getElementById("foundCount")
.innerText=found;

logs.innerHTML +=
"<span style='color:#60a5fa'>SECURE HASH DETECTED</span><br>";

}

logs.scrollTop=
logs.scrollHeight;

},800);

}else{

scanning=false;

btn.innerText="START SCAN";

clearInterval(interval);

}

}

</script>

</body>
</html>
